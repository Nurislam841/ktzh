name: Deploy KTZ

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: adilzhan17/ktz-backend
  FRONTEND_IMAGE: adilzhan17/ktz-frontend
  SERVER_IP: ${{ secrets.SERVER_IP }}
  DEPLOY_DIR: /root/ktz

jobs:
  build_backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_REPO=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  build_frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Convert repository name to lowercase
        run: |
          echo "IMAGE_REPO=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    needs: [build_backend, build_frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node for Prisma
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Push Database Schema to Supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          npm install prisma
          npx prisma db push --accept-data-loss

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Create deployment directories
        run: |
          ssh root@${{ env.SERVER_IP }} "mkdir -p ${{ env.DEPLOY_DIR }}/backend ${{ env.DEPLOY_DIR }}/frontend"

      - name: Copy docker-compose
        run: |
          scp docker-compose.yml root@${{ env.SERVER_IP }}:${{ env.DEPLOY_DIR }}/docker-compose.yml

      - name: Execute deployment commands
        run: |
          ssh root@${{ env.SERVER_IP }} << 'ENDSSH'
          set -e
          cd ${{ env.DEPLOY_DIR }}

          # Create backend env file
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > backend/.env
          echo "REDIS_URL=redis://redis:6379" >> backend/.env
          echo "PORT=3001" >> backend/.env
          echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" >> backend/.env
          echo "NODE_ENV=production" >> backend/.env

          # Create frontend env file
          echo "NEXT_PUBLIC_API_URL=http://${{ env.SERVER_IP }}:11434" > frontend/.env

          # Setup repo name for image pulling
          echo "IMAGE_REPO=adilzhan17" > .env

          # Login to GHCR on the VPS
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # Pull latest images
          docker compose pull backend frontend

          # Restart containers without pulling/building everything else from scratch
          docker compose up -d

          # Cleanup old dangling images
          docker image prune -f
          ENDSSH
