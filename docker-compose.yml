services:
  redis:
    image: redis:7-alpine
    container_name: ktz_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${IMAGE_REPO:-adilzhan17}/ktz-backend:latest
    container_name: ktz_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - '11434:3001'
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/${IMAGE_REPO:-adilzhan17}/ktz-frontend:latest
    container_name: ktz_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '8989:3000'
    depends_on:
      - backend

volumes:
  redis_data:
